<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moulage Home</title>
    <style>
        /* Reset básico e visual sofisticado e minimalista */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        /* Tela de Entrada (Overlay para libertar o áudio) */
        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #050505;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.8s ease, visibility 0.8s;
        }
        #overlay.hidden {
            opacity: 0;
            visibility: hidden;
        }
        .enter-btn {
            background: none;
            border: 1px solid #ffffff;
            color: #ffffff;
            padding: 12px 35px;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 4px;
            cursor: pointer;
            transition: all 0.4s ease;
        }
        .enter-btn:hover {
            background-color: #ffffff;
            color: #000000;
        }

        /* Container do Vídeo de Fundo */
        .video-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
    </style>
</head>
<body>

    <!-- 1. TELA DE ENTRADA (O segredo para a música tocar) -->
    <div id="overlay">
        <button class="enter-btn" onclick="iniciarExperiencia()">Entrar</button>
    </div>

    <!-- 2. CONTAINER DO VÍDEO -->
    <div class="video-container">
        <!-- Substitui 'seu_video.mp4' pelo nome exato do teu arquivo de vídeo que está dentro da pasta vídeos -->
        <video id="bg-video" loop playsinline muted>
            <source src="vídeos/seu_video.mp4" type="video/mp4">
        </video>
    </div>

    <!-- 3. ELEMENTO DE ÁUDIO -->
    <audio id="bg-music" loop playsinline>
        <source src="musica1.mp3" type="audio/mpeg">
    </audio>

    <!-- 4. SCRIPT DE CONTROLO -->
    <script>
        function iniciarExperiencia() {
            const overlay = document.getElementById('overlay');
            const video = document.getElementById('bg-video');
            const audio = document.getElementById('bg-music');

            // Esconde a tela de entrada com efeito suave
            overlay.classList.add('hidden');

            // Dá play no vídeo e retira o "muted" se quiseres som do vídeo também, 
            // mas como temos a música de fundo, mantemos o vídeo em silêncio.
            video.play().catch(error => console.log("Erro ao tocar vídeo:", error));

            // Dá play na música de fundo (o clique do botão valida a permissão do navegador)
            audio.play().catch(error => {
                console.log("Erro ao tocar áudio:", error);
                alert("Por favor, clique novamente para ativar o som.");
            });
        }
    </script>

</body>
</html>
