<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Moulage Parfums — SALITRE Ritual</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Manrope:wght@300;500&display=swap" rel="stylesheet">

    <style>
        /* --- DESIGN SYSTEM MOULAGE PARFUMS --- */
        :root {
            --emerald: #0B2D24;
            --sage: #1A4D3F;
            --linen: #F8F5F0;
            --champagne: #C5A880;
            --slate-blue: #6B8E9B;
            --font-serif: 'Cormorant Garamond', serif;
            --font-sans: 'Manrope', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        html {
            scroll-behavior: smooth;
            background-color: var(--emerald);
        }

        body {
            font-family: var(--font-sans);
            background-color: var(--linen);
            color: var(--emerald);
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        h1, h2, h3 {
            font-family: var(--font-serif);
            font-weight: 400;
            letter-spacing: 0.05em;
        }

        p {
            font-weight: 300;
            line-height: 1.8;
            letter-spacing: 0.02em;
        }

        /* --- LOGOTIPO --- */
        .brand-container {
            text-align: center;
        }
        .brand-logo {
            font-family: var(--font-serif);
            font-size: 18px;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            font-weight: 600;
        }
        .brand-sub {
            font-family: var(--font-sans);
            font-size: 8px;
            letter-spacing: 0.4em;
            text-transform: uppercase;
            color: var(--champagne);
            margin-top: 4px;
            font-weight: 500;
        }

        /* --- BOTÕES PREMIUM --- */
        .btn-premium {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: var(--champagne);
            color: var(--emerald);
            border: 1px solid var(--champagne);
            padding: 18px 36px;
            font-family: var(--font-sans);
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            border-radius: 0px;
        }
        .btn-premium:hover {
            background: transparent;
            color: var(--champagne);
        }

        .reveal {
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 0.8s ease, transform 0.8s ease;
        }
        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }

        /* =========================================================
           1. HERO - IMERSÃO
           ========================================================= */
        .hero-section {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            padding: 24px;
        }

        .hero-media {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
        }
        .hero-texture {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=100');
            opacity: 0.08;
            z-index: 2;
            pointer-events: none;
        }
        .hero-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--emerald);
            opacity: 0.45;
            z-index: 3;
        }

        .hero-content {
            position: relative;
            z-index: 4;
            text-align: center;
            max-width: 400px;
        }
        .hero-content .brand-logo { color: var(--linen); }

        .hero-title {
            font-size: 54px;
            color: var(--linen);
            margin: 40px 0 10px 0;
            letter-spacing: 0.15em;
        }
        .hero-subtitle {
            font-family: var(--font-sans);
            font-size: 10px;
            color: var(--linen);
            letter-spacing: 0.2em;
            text-transform: uppercase;
            opacity: 0.9;
        }
        .hero-line {
            width: 40px;
            height: 1px;
            background: var(--champagne);
            margin: 24px auto;
        }
        .hero-text {
            font-family: var(--font-serif);
            font-style: italic;
            font-size: 20px;
            color: var(--linen);
            margin-bottom: 40px;
        }

        /* =========================================================
           2. PLAYER "MARÉ CHEIA" - IMERSIVO FULLSCREEN
           ========================================================= */
        .player-section {
            display: none; 
            position: relative;
            width: 100%;
            height: 100vh;
            background: var(--emerald);
            text-align: center;
            overflow: hidden;
            z-index: 10;
        }
        .player-section.active {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 24px;
        }

        .player-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
            opacity: 0;
            transition: opacity 1.5s ease-in-out;
        }
        .player-bg.visible {
            opacity: 0.25; 
        }

        .player-content {
            position: relative;
            z-index: 5;
            max-width: 600px;
            width: 100%;
        }

        .pulse-container {
            position: relative;
            width: 120px;
            height: 120px;
            margin: 0 auto 30px auto;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .pulse-circle {
            position: absolute;
            width: 100%;
            height: 100%;
            background: var(--champagne);
            border-radius: 50%;
            opacity: 0.15;
        }
        .pulse-circle.animating {
            animation: oceanPulse 3.5s infinite ease-in-out;
        }
        .pulse-core {
            width: 50px;
            height: 50px;
            background: var(--champagne);
            border-radius: 50%;
            opacity: 0.8;
        }

        @keyframes oceanPulse {
            0% { transform: scale(1); opacity: 0.15; }
            50% { transform: scale(1.4); opacity: 0.4; }
            100% { transform: scale(1); opacity: 0.15; }
        }

        .player-timer {
            font-family: var(--font-serif);
            font-size: 54px;
            color: var(--linen);
            margin-bottom: 20px;
            font-weight: 300;
            letter-spacing: 0.05em;
        }

        .ritual-text-container {
            min-height: 120px;
            margin-bottom: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .ritual-message {
            font-family: var(--font-serif);
            font-style: italic;
            font-size: 24px;
            color: var(--linen);
            line-height: 1.6;
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 0.6s ease, transform 0.6s ease;
        }
        .ritual-message.show {
            opacity: 1;
            transform: translateY(0);
        }

        .btn-pause-ritual {
            background: transparent;
            border: 1px solid rgba(248, 245, 240, 0.4);
            color: var(--linen);
            font-family: var(--font-sans);
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.3em;
            cursor: pointer;
            padding: 14px 36px;
            transition: all 0.3s ease;
        }
        .btn-pause-ritual:hover {
            border-color: var(--champagne);
            color: var(--champagne);
        }

        /* =========================================================
           MODAL DE FIM DE RITUAL (CONFORTANTE E DIVERTIDO)
           ========================================================= */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(11, 45, 36, 0.95);
            z-index: 100;
            justify-content: center;
            align-items: center;
            padding: 24px;
        }
        .modal-overlay.active {
            display: flex;
        }
        .modal-box {
            background: var(--linen);
            padding: 50px 40px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            border: 1px solid var(--champagne);
            color: var(--emerald);
            transform: scale(0.9);
            transition: transform 0.4s ease;
        }
        .modal-overlay.active .modal-box {
            transform: scale(1);
        }
        .modal-box h3 {
            font-size: 28px;
            margin-bottom: 20px;
            color: var(--emerald);
        }
        .modal-box p {
            font-size: 16px;
            color: var(--sage);
            margin-bottom: 35px;
        }

        /* =========================================================
           3. O RITUAL SECÇÕES PADRÃO
           ========================================================= */
        .ritual-section {
            background: var(--emerald);
            color: var(--linen);
            padding: 100px 24px;
        }
        .ritual-section h2 {
            text-align: center;
            font-size: 32px;
            margin-bottom: 60px;
            letter-spacing: 0.1em;
        }
        .ritual-grid {
            max-width: 1100px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr;
            gap: 60px;
        }
        .ritual-card { display: flex; flex-direction: column; }
        .ritual-num {
            font-family: var(--font-serif);
            font-size: 40px;
            color: var(--champagne);
            margin-bottom: 15px;
        }
        .ritual-img-wrapper {
            width: 100%;
            height: 380px;
            overflow: hidden;
            margin-bottom: 20px;
        }
        .ritual-img-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 1.2s ease;
        }
        .ritual-card:hover .ritual-img-wrapper img { transform: scale(1.04); }

        /* =========================================================
           4. O SEGREDO & RECOMPRA
           ========================================================= */
        .secret-section {
            background: var(--linen);
            padding: 120px 24px;
            display: flex;
            justify-content: center;
        }
        .secret-container {
            max-width: 650px;
            border: 1px solid var(--champagne);
            padding: 60px 40px;
            text-align: center;
        }
        .secret-title {
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.25em;
            color: var(--champagne);
            margin-bottom: 30px;
        }
        .secret-text {
            font-family: var(--font-serif);
            font-size: 20px;
            line-height: 1.8;
            margin-bottom: 30px;
        }
