<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moulage Home - Rituais</title>
    <style>
        * { box-sizing: border-box; }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Times New Roman', Times, serif;
            overflow: hidden; background-color: #0b0b0b; color: #ffffff;
        }

        /* Galeria de Imagens de Fundo */
        .bg-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1;
        }
        .bg-image {
            width: 100%; height: 100%; background-size: cover; background-position: center;
            position: absolute; top: 0; left: 0; opacity: 0; transition: opacity 2.5s ease-in-out;
        }
        .bg-image.active { opacity: 0.3; transform: scale(1.03); transition: transform 8s ease-in-out, opacity 2.5s ease-in-out; }
        .bg-image.default { opacity: 0.15; background-image: url('https://images.unsplash.com/photo-1602874801007-bd458bb1b8b6?auto=format&fit=crop&q=80&w=1200'); }

        /* Interface */
        .overlay {
            position: relative; z-index: 2; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: space-between;
            align-items: center; padding: 60px 24px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.6) 0%, rgba(0,0,0,0.2) 50%, rgba(0,0,0,0.7) 100%);
            text-align: center;
        }

        .fade-element { transition: opacity 1s ease; opacity: 1; }
        .fade-element.hidden { opacity: 0; pointer-events: none; }

        header h1 { font-size: 26px; font-weight: 300; letter-spacing: 6px; text-transform: uppercase; margin: 0; }
        header p { font-size: 11px; font-style: italic; letter-spacing: 2px; color: #c5c5ca; margin-top: 8px; text-transform: uppercase; }

        .main-content { max-width: 320px; margin: auto 0; display: flex; flex-direction: column; align-items: center; }
        
        /* Texto Fluido das Mensagens */
        .message-display {
            font-size: 16px; line-height: 2.2; font-style: italic; color: #f5f5f7;
            letter-spacing: 0.5px; opacity: 1; transition: opacity 1s ease;
            margin-bottom: 30px; min-height: 140px; display: flex; align-items: center;
        }

        .moments-grid { display: flex; flex-direction: column; gap: 12px; width: 100%; max-width: 280px; }
        
        /* Botões Estilo Alta Costura */
        .btn-luxury {
            background: rgba(255, 255, 255, 0.03); color: #ffffff; border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 14px; font-family: 'Times New Roman', serif; font-size: 12px; letter-spacing: 3px;
            text-transform: uppercase; border-radius: 2px; cursor: pointer; transition: all 0.4s ease;
        }
        .btn-luxury:hover { background: #ffffff; color: #000000; border-color: #ffffff; }

        .btn-action {
            background: #ffffff; color: #000000; border: none; padding: 12px 30px;
            font-size: 11px; letter-spacing: 3px; text-transform: uppercase; cursor: pointer;
            border-radius: 30px; transition: all 0.4s ease; box-shadow: 0 4px 15px rgba(255,255,255,0.1);
        }
        .btn-action:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(255,255,255,0.2); }
    </style>
</head>
<body>

    <!-- Músicas com canais calmos de Piano e Natureza -->
    <audio id="audio-dawn" loop><source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3" type="audio/mp3"></audio>
    <audio id="audio-dusk" loop><source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-6.mp3" type="audio/mp3"></audio>
    <audio id="audio-night" loop><source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-16.mp3" type="audio/mp3"></audio>

    <div class="bg-container">
        <div id="bg-default" class="bg-image default"></div>
        <div id="bg-slide1" class="bg-image"></div>
        <div id="bg-slide2" class="bg-image"></div>
    </div>

    <div class="overlay">
        <header id="main-header" class="fade-element">
            <h1>Moulage Home</h1>
            <p>Rituels d'Atmosphère</p>
        </header>

        <div class="main-content">
            <div id="text-display" class="message-display">
                Aproxime o seu telemóvel da tampa para alinhar a sua mente com o momento presente.
            </div>
            <div id="action-area" class="fade-element" style="display: none;">
                <!-- Botões dinâmicos aparecem aqui -->
            </div>
        </div>

        <div id="buttons-menu" class="moments-grid fade-element">
            <button class="btn-luxury" onclick="abrirJanelaRitual('dawn')">Manhã de Sol</button>
            <button class="btn-luxury" onclick="abrirJanelaRitual('dusk')">Calmaria do Entardecer</button>
            <button class="btn-luxury" onclick="abrirJanelaRitual('night')">Quietude da Noite</button>
        </div>
    </div>

    <script>
        // Banco de Dados de 50 Frases de Conforto e Orientação (Exemplo reduzido para o teste)
        const loteFrases = [
            "Bem-vindo ao seu refúgio de paz. Acenda a sua vela e sinta o pavio ganhar vida.",
            "Feche os olhos por três segundos. Respire o aroma fresco que começa a emanar.",
            "Deixe que a luz suave guie a sua atenção para o momento presente. O mundo lá fora pode esperar.",
            "Sinta o ar a entrar frio e a sair quente. Relaxe a linha entre as suas sobrancelhas.",
            "Não há nada para resolver nos próximos minutos. Apenas sinta a atmosfera a transformar-se.",
            "Permita que os seus ombros caiam. Solte a tensão acumulada ao longo das últimas horas.",
            "O perfume do alecrim e da sálvia limpa os pensamentos. Sinta a clareza a retornar à sua mente.",
            "Cada segundo em silêncio é um presente que dá a si mesmo. Deixe o ritmo desacelerar.",
            "Sinta a vibração calma da música. Deixe que ela preencha o espaço ao seu redor.",
            "O seu ritual de hoje está completo. Leve essa sensação de aconchego consigo para o resto do dia."
        ];

        // Bancos de imagens por momento (Unsplash Premium)
        const imagensMomento = {
            dawn: [
                'https://images.unsplash.com/photo-1502082553048-f009c37129b9?auto=format&fit=crop&q=80&w=1200',
                'https://images.unsplash.com/photo-1470252649378-9c29740c9fa8?auto=format&fit=crop&q=80&w=1200'
            ],
            dusk: [
                'https://images.unsplash.com/photo-1517245386807-bb43f82c33c4?auto=format&fit=crop&q=80&w=1200',
                'https://images.unsplash.com/photo-1475924156734-496f6cac6ec1?auto=format&fit=crop&q=80&w=1200'
            ],
            night: [
                'https://images.unsplash.com/photo-1603006905003-be475563bc59?auto=format&fit=crop&q=80&w=1200',
                'https://images.unsplash.com/photo-1516589178581-6cd7833ae3b2?auto=format&fit=crop&q=80&w=1200'
            ]
        };

        let ritualAtual = '';
        let indiceFraseRitual = 0;
        let frasesSelecionadas = [];
        let intervaloImagens;

        function abrirJanelaRitual(momento) {
            ritualAtual = momento;
            document.getElementById('buttons-menu').classList.add('hidden');
            document.getElementById('main-header').classList.add('hidden');
            
            // Setup do lote de 10 frases (Aqui simulamos o lote do dia usando a nossa lista)
            frasesSelecionadas = loteFrases; // Na versão final, puxamos as 10 não repetidas da lista de 50
            indiceFraseRitual = 0;

            document.getElementById('text-display').innerHTML = "O seu ambiente está pronto.<br>Prepare-se para desacelerar.";
            
            const areaAcao = document.getElementById('action-area');
            areaAcao.innerHTML = `<button class="btn-action" onclick="iniciarMusicaEFrases()">Iniciar Ritual de Paz</button>`;
            areaAcao.style.display = "block";

            // Inicia o fundo com a primeira imagem do momento
            trocarFundoImagem(imagensMomento[momento][0]);
        }

        function iniciarMusicaEFrases() {
            // Toca a música calma correspondente
            const audioId = ritualAtual === 'dawn' ? 'audio-dawn' : ritualAtual === 'dusk' ? 'audio-dusk' : 'audio-night';
            const audio = document.getElementById(audioId);
            audio.volume = 0.3;
            audio.play();

            // Esconde o botão de início para focar no ritual
            document.getElementById('action-area').style.display = "none";

            // Inicia o ciclo de passar as 10 frases
            avançarFraseRitual();
        }

        function avançarFraseRitual() {
            const display = document.getElementById('text-display');
            display.style.opacity = 0;

            setTimeout(() => {
                if (indiceFraseRitual < frasesSelecionadas.length) {
                    display.innerHTML = frasesSelecionadas[indiceFraseRitual];
                    display.style.opacity = 1;

                    // Alterna as imagens de fundo a cada 2 frases para dar dinamismo suave
                    const fotos = imagensMomento[ritualAtual];
                    const fotoDaVez = fotos[indiceFraseRitual % fotos.length];
                    trocarFundoImagem(fotoDaVez);

                    indiceFraseRitual++;
                    
                    // Espera 6 segundos na frase e vai para a próxima automaticamente
                    setTimeout(avançarFraseRitual, 6500);
                } else {
                    // Chegou ao fim das 10 frases
                    display.innerHTML = "Sinta a leveza que reside no agora.<br>O seu ritual foi concluído.";
                    display.style.opacity = 1;

                    // Libera o botão de finalizar
                    const areaAcao = document.getElementById('action-area');
                    areaAcao.innerHTML = `<button class="btn-action" onclick="finalizarRitual()">Finalizar Ritual</button>`;
                    areaAcao.style.display = "block";
                }
            }, 1000);
        }

        function trocarFundoImagem(url) {
            const img1 = document.getElementById('bg-slide1');
            const img2 = document.getElementById('bg-slide2');
            document.getElementById('bg-default').style.opacity = 0;

            if (img1.classList.contains('active')) {
                img2.style.backgroundImage = `url('${url}')`;
                img2.classList.add('active');
                img1.classList.remove('active');
            } else {
                img1.style.backgroundImage = `url('${url}')`;
                img1.classList.add('active');
                img2.classList.remove('active');
            }
        }

        function finalizarRitual() {
            // Para a música
            document.querySelectorAll('audio').forEach(a => a.pause());
            
            // Limpa os fundos e volta ao estado inicial
            document.getElementById('bg-slide1').classList.remove('active');
            document.getElementById('bg-slide2').classList.remove('active');
            document.getElementById('bg-default').style.opacity = 0.15;

            document.getElementById('main-header').classList.remove('hidden');
            document.getElementById('buttons-menu').classList.remove('hidden');
            document.getElementById('action-area').style.display = "none";
            document.getElementById('text-display').innerHTML = "Aproxime o seu telemóvel da tampa para alinhar a sua mente com o momento presente.";
        }
    </script>
</body>
</html>
